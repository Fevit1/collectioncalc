<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 360px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    
    .header {
      padding: 16px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid #333;
    }
    
    .header h1 {
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header .version {
      font-size: 11px;
      color: #888;
      font-weight: normal;
    }
    
    .stats-row {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 215, 0, 0.1);
    }
    
    .stat-box {
      flex: 1;
      text-align: center;
      padding: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #ffd700;
    }
    
    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #333;
    }
    
    .section-title {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .tabs-list {
      max-height: 120px;
      overflow-y: auto;
    }
    
    .tab-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    
    .tab-item .stream-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .tab-item .tab-status {
      color: #4CAF50;
      font-size: 11px;
    }
    
    .sales-list {
      max-height: 200px;
      overflow-y: auto;
    }
    
    .sale-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    
    .sale-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 10px;
    }
    
    .sale-price {
      color: #4CAF50;
      font-weight: bold;
    }
    
    .sale-time {
      color: #666;
      font-size: 10px;
      margin-left: 8px;
    }
    
    .actions {
      padding: 16px;
      display: flex;
      gap: 8px;
    }
    
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #ffd700;
      color: #000;
    }
    
    .btn-primary:hover {
      background: #ffed4a;
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .btn-danger {
      background: rgba(244, 67, 54, 0.3);
      color: #ef5350;
    }
    
    .btn-danger:hover {
      background: rgba(244, 67, 54, 0.5);
    }
    
    .empty-state {
      text-align: center;
      color: #666;
      padding: 20px;
      font-size: 13px;
    }
    
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #555;
    }
    
    .footer a {
      color: #64b5f6;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Comic Valuator <span class="version">v2.1</span></h1>
  </div>
  
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-value" id="total-sales">0</div>
      <div class="stat-label">Total Sales</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="active-tabs">0</div>
      <div class="stat-label">Active Tabs</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="total-value">$0</div>
      <div class="stat-label">Total Value</div>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">Active Streams</div>
    <div class="tabs-list" id="tabs-list">
      <div class="empty-state">No active Whatnot tabs</div>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">Recent Sales</div>
    <div class="sales-list" id="sales-list">
      <div class="empty-state">No sales recorded yet</div>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn-primary" id="export-btn">📥 Export</button>
    <button class="btn-secondary" id="refresh-btn">🔄 Refresh</button>
    <button class="btn-danger" id="clear-btn">🗑️ Clear</button>
  </div>
  
  <div class="footer">
    Made for comic collectors 🕷️📚
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
