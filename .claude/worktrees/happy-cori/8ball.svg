<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer circle: dark navy with gold stroke -->
  <circle cx="50" cy="50" r="47" fill="#1a1a3e" stroke="#c9a84c" stroke-width="2"/>
  <!-- Inner white circle: ~35% of diameter -->
  <circle cx="50" cy="50" r="17.5" fill="#ffffff"/>
  <!-- 8: black, IBM Plex Mono bold, centered -->
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
        font-family="'IBM Plex Mono','JetBrains Mono','Courier New',monospace"
        font-size="24" font-weight="700" fill="#000000">8</text>
</svg>
