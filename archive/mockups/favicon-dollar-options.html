<!DOCTYPE html>
<html>
<head>
<title>Favicon $ Options - Black BG, Leaning Right</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
<style>
  body { background: #1a1a2e; color: #fff; font-family: Arial, sans-serif; padding: 40px; }
  h1 { font-family: 'Bangers', cursive; color: #facc15; text-align: center; font-size: 2.5rem; }
  h2 { color: #a78bfa; text-align: center; margin-top: 40px; }
  .options { display: flex; flex-wrap: wrap; justify-content: center; gap: 50px; margin: 30px auto; }
  .option { text-align: center; }
  .option label { display: block; color: #ccc; margin-top: 10px; font-size: 14px; }
  .sizes { display: flex; align-items: flex-end; gap: 16px; justify-content: center; }
  .size-label { color: #888; font-size: 11px; text-align: center; }
  .current { border: 2px solid #facc15; border-radius: 8px; padding: 10px; }
  .current-label { color: #facc15; font-size: 12px; text-align: center; margin-top: 4px; }
  .divider { border-top: 1px solid #333; margin: 40px 0; }
</style>
</head>
<body>

<h1>Favicon $ — Black BG, Leaning Right</h1>
<p style="text-align:center; color:#888;">Big bold gold $ on black, tilted right like Yahoo! style. Varying tilt amounts.</p>

<div class="divider"></div>

      <text x="32" y="52" text-anchor="middle" font-family="'Bangers','Impact','Arial Black',sans-serif" font-size="56" fill="#facc15" transform="rotate(8, 32, 38)">$</text>
    </svg>
