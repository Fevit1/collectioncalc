<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollectionCalc - Coming Soon</title>
    <meta name="description" content="CollectionCalc is assembling something special for comic collectors. Stay tuned.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 800px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: clamp(3rem, 8vw, 5rem);
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .status {
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: #c7d2fe;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: #a5b4fc;
            line-height: 1.6;
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta {
            display: inline-block;
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }

        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(124, 58, 237, 0.6);
        }

        .cta-label {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        /* Animated dots */
        .dots {
            display: inline-block;
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .dots::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        /* Mobile adjustments */
        @media (max-width: 640px) {
            body {
                padding: 1.5rem;
            }

            .logo {
                margin-bottom: 0.5rem;
            }

            .tagline {
                margin-bottom: 2rem;
            }

            .cta {
                padding: 0.875rem 1.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">CollectionCalc</h1>
        <p class="status">Coming Soon<span class="dots"></span></p>
        <p class="tagline">
            Like Tony Stark in a cave... but with better WiFi and more coffee. ☕
        </p>
        
        <div style="margin-top: 3rem;">
            <p class="cta-label">In the meantime:</p>
            <a href="https://slabworthy.com" class="cta">
                Grade Your Comics at Slab Worthy™ →
            </a>
        </div>
    </div>
</body>
</html>
